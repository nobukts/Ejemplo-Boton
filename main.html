<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login y registro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Contenedor principal de la interfaz de autenticación. -->
    <main class="content">
      <section class="card">
        <h2>Mi cuenta</h2>

        <!-- Pestañas para alternar entre login y registro. -->
        <div class="tabs">
          <button id="tab-login" class="tab active" type="button">
            Iniciar sesión
          </button>
          <button id="tab-register" class="tab" type="button">
            Registrarse
          </button>
        </div>

        <!-- Zona de mensajes de validación (error/ok). -->
        <p id="status" class="status"></p>

        <!-- Formulario de inicio de sesión. -->
        <form id="login-form" class="form" novalidate>
          <label for="login-email">Correo</label>
          <input
            id="login-email"
            type="email"
            placeholder="correo@ejemplo.com"
            required
          />

          <label for="login-password">Contraseña</label>
          <input
            id="login-password"
            type="password"
            placeholder="Mínimo 6 caracteres"
            required
          />

          <button type="submit">Entrar</button>
        </form>

        <!-- Formulario de creación de cuenta. -->
        <form id="register-form" class="form hidden" novalidate>
          <label for="register-name">Nombre</label>
          <input
            id="register-name"
            type="text"
            placeholder="Tu nombre"
            required
          />

          <label for="register-rut">RUT</label>
          <input
            id="register-rut"
            type="text"
            placeholder="12345678-9"
            required
          />

          <label for="register-email">Correo</label>
          <input
            id="register-email"
            type="email"
            placeholder="correo@ejemplo.com"
            required
          />

          <label for="register-password">Contraseña</label>
          <input
            id="register-password"
            type="password"
            placeholder="Mínimo 8 caracteres"
            required
          />

          <label for="register-confirm">Confirmar contraseña</label>
          <input
            id="register-confirm"
            type="password"
            placeholder="Repite tu contraseña"
            required
          />

          <button type="submit">Crear cuenta</button>
        </form>

        <!-- Panel visible luego de autenticar (simulado en frontend). -->
        <section id="user-panel" class="panel hidden" aria-live="polite">
          <h3>Panel de usuario</h3>
          <p id="panel-name">Nombre: -</p>
          <p id="panel-rut">RUT: -</p>
          <p id="panel-email">Correo: -</p>
          <p id="panel-state">Estado: Activo</p>
          <button id="logout-btn" type="button">Cerrar sesión</button>
        </section>
      </section>
    </main>

    <!-- Pie de página informativo del ejemplo. -->
    <footer class="site-footer">
      <p>Ejemplo de autenticación - 2026</p>
    </footer>

    <!-- Dependencias y lógica de interacción de la página. -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="boton.js"></script>
  </body>
</html>
