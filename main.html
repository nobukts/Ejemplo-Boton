<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login y registro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="content">
      <section class="card">
        <h2>Mi cuenta</h2>

        <div class="tabs">
          <button id="tab-login" class="tab active" type="button">
            Iniciar sesión
          </button>
          <button id="tab-register" class="tab" type="button">
            Registrarse
          </button>
        </div>

        <p id="status" class="status"></p>

        <form id="login-form" class="form" novalidate>
          <label for="login-email">Correo</label>
          <input
            id="login-email"
            type="email"
            placeholder="correo@ejemplo.com"
            required
          />

          <label for="login-password">Contraseña</label>
          <input
            id="login-password"
            type="password"
            placeholder="Mínimo 6 caracteres"
            required
          />

          <button type="submit">Entrar</button>
        </form>

        <form id="register-form" class="form hidden" novalidate>
          <label for="register-name">Nombre</label>
          <input
            id="register-name"
            type="text"
            placeholder="Tu nombre"
            required
          />

          <label for="register-rut">RUT</label>
          <input
            id="register-rut"
            type="text"
            placeholder="12345678-9"
            required
          />

          <label for="register-email">Correo</label>
          <input
            id="register-email"
            type="email"
            placeholder="correo@ejemplo.com"
            required
          />

          <label for="register-password">Contraseña</label>
          <input
            id="register-password"
            type="password"
            placeholder="Mínimo 6 caracteres"
            required
          />

          <label for="register-confirm">Confirmar contraseña</label>
          <input
            id="register-confirm"
            type="password"
            placeholder="Repite tu contraseña"
            required
          />

          <button type="submit">Crear cuenta</button>
        </form>

        <section id="user-panel" class="panel hidden" aria-live="polite">
          <div class="profile-icon" aria-hidden="true">
            <svg viewBox="0 0 72 72" role="img" focusable="false">
              <circle
                cx="36"
                cy="36"
                r="34"
                fill="#a8c9ef"
                stroke="#1f2937"
                stroke-width="2.8"
              />
              <ellipse cx="36" cy="26" rx="12.5" ry="13.5" fill="#f6d4bf" />
              <path
                d="M24.5 24.5c0-8 5.2-13.2 11.5-13.2s11.5 5.2 11.5 13.2v4.4h-3.2v-2.5c-3.6-.2-6.8-1.3-9.2-3.4-2.1 2.2-5.1 3.4-8.8 3.6v2.3h-2.8Z"
                fill="#1f2937"
              />
              <rect x="31" y="35" width="10" height="8" rx="3" fill="#f2c2a8" />
              <path
                d="M16 58c0-9.3 9-14.8 20-14.8S56 48.7 56 58v1.1H16V58Z"
                fill="#315f8f"
              />
              <path d="M26.8 59.1 33 45.2h6l6.2 13.9Z" fill="#111827" />
              <path d="M33 45.2h6l-3 6.2Z" fill="#ffffff" />
              <path d="M36 51.4 39.2 59H32.8Z" fill="#b91c1c" />
              <circle cx="30.5" cy="27.5" r="1.2" fill="#111827" />
              <circle cx="41.5" cy="27.5" r="1.2" fill="#111827" />
              <path
                d="M33 32.2c1.8 1.9 4.2 1.9 6 0"
                fill="none"
                stroke="#b86e5b"
                stroke-width="1.4"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <h3>Panel de usuario</h3>
          <p id="panel-name">Nombre: -</p>
          <p id="panel-rut">RUT: -</p>
          <p id="panel-email">Correo: -</p>
          <p id="panel-state">Estado: Activo</p>
          <button id="logout-btn" type="button">Cerrar sesión</button>
        </section>
      </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="boton.js"></script>
  </body>
</html>
