<!doctype html>
<!--
  Documento principal de autenticacion.
  Caracteristicas HTML usadas aqui:
  - Estructura semantica: main, section, form.
  - Accesibilidad basica: label/for, aria-live, aria-hidden.
  - Formularios con validacion personalizada (novalidate + JS).
-->
<html lang="es">
  <head>
    <!-- Permite caracteres especiales (tildes, eñe, etc.). -->
    <meta charset="UTF-8" />
    <!-- Hace que el layout se adapte correctamente en moviles. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login y registro</title>
    <!-- Hoja de estilos principal del proyecto. -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="content">
      <!-- Tarjeta visual que agrupa login, registro y panel de usuario. -->
      <section class="card">
        <h2>Mi cuenta</h2>

        <div class="tabs">
          <button id="tab-login" class="tab active" type="button">
            Iniciar sesión
          </button>
          <button id="tab-register" class="tab" type="button">
            Registrarse
          </button>
        </div>

        <p id="status" class="status"></p>

        <form id="login-form" class="form" novalidate>
          <!-- label for enlaza etiqueta con input para accesibilidad y foco. -->
          <label for="login-email">Correo</label>
          <input
            id="login-email"
            type="email"
            placeholder="correo@ejemplo.com"
            required
          />

          <label for="login-password">Contraseña</label>
          <input
            id="login-password"
            type="password"
            placeholder="Mínimo 6 caracteres"
            required
          />

          <button type="submit">Entrar</button>
        </form>

        <form id="register-form" class="form hidden" novalidate>
          <label for="register-name">Nombre</label>
          <input
            id="register-name"
            type="text"
            placeholder="Tu nombre"
            required
          />

          <label for="register-rut">RUT</label>
          <input
            id="register-rut"
            type="text"
            placeholder="12345678-9"
            required
          />

          <label for="register-email">Correo</label>
          <input
            id="register-email"
            type="email"
            placeholder="correo@ejemplo.com"
            required
          />

          <label for="register-password">Contraseña</label>
          <input
            id="register-password"
            type="password"
            placeholder="Mínimo 6 caracteres"
            required
          />

          <label for="register-confirm">Confirmar contraseña</label>
          <input
            id="register-confirm"
            type="password"
            placeholder="Repite tu contraseña"
            required
          />

          <button type="submit">Crear cuenta</button>
        </form>

        <section id="user-panel" class="panel hidden" aria-live="polite">
          <h3>Panel de usuario</h3>
          <p id="panel-name">Nombre: -</p>
          <p id="panel-rut">RUT: -</p>
          <p id="panel-email">Correo: -</p>
          <p id="panel-state">Estado: Activo</p>
          <button id="logout-btn" type="button">Cerrar sesión</button>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <p>Ejemplo de autenticación - 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Logica de tabs, validaciones y panel de usuario. -->
    <script src="boton.js"></script>
  </body>
</html>
