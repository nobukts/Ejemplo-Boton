<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login y registro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Mi cuenta</h1>

      <div class="tabs">
        <button id="tab-login" class="tab active" type="button">
          Iniciar sesion
        </button>
        <button id="tab-register" class="tab" type="button">Registrarse</button>
      </div>

      <p id="status" class="status"></p>

      <form id="login-form" class="form" novalidate>
        <label for="login-email">Correo</label>
        <input
          id="login-email"
          type="email"
          placeholder="correo@ejemplo.com"
          required
        />

        <label for="login-password">Contrasena</label>
        <input
          id="login-password"
          type="password"
          placeholder="Minimo 6 caracteres"
          required
        />

        <button type="submit">Entrar</button>
      </form>

      <form id="register-form" class="form hidden" novalidate>
        <label for="register-name">Nombre</label>
        <input
          id="register-name"
          type="text"
          placeholder="Tu nombre"
          required
        />

        <label for="register-email">Correo</label>
        <input
          id="register-email"
          type="email"
          placeholder="correo@ejemplo.com"
          required
        />

        <label for="register-password">Contrasena</label>
        <input
          id="register-password"
          type="password"
          placeholder="Minimo 8 caracteres"
          required
        />

        <label for="register-confirm">Confirmar contrasena</label>
        <input
          id="register-confirm"
          type="password"
          placeholder="Repite tu contrasena"
          required
        />

        <button type="submit">Crear cuenta</button>
      </form>

      <section id="user-panel" class="panel hidden" aria-live="polite">
        <h2>Panel de usuario</h2>
        <p><strong>Nombre:</strong> <span id="panel-name">-</span></p>
        <p><strong>Correo:</strong> <span id="panel-email">-</span></p>
        <p><strong>Estado:</strong> <span id="panel-state">Activo</span></p>
        <button id="logout-btn" type="button">Cerrar sesion</button>
      </section>
    </main>

    <script src="boton.js"></script>
  </body>
</html>
